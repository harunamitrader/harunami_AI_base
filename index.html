<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="harunami_base — AI情報を集約する総合ポータルサイト。"
    />
    <meta name="theme-color" content="#f7fbff" />
    <title>harunami AI base</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .top-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
        gap: 20px;
        margin-top: 8px;
      }

      .nav-card {
        display: block;
        position: relative;
        overflow: hidden;
        padding: 28px;
        padding-left: 24px;
        border-radius: var(--radius-lg);
        border: 1px solid var(--line);
        background: var(--surface-strong);
        color: inherit;
        text-decoration: none;
        transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      }

      .nav-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 4px;
        height: 100%;
        background: var(--card-accent, var(--primary));
        opacity: 0.7;
      }

      .nav-card:hover {
        transform: translateY(-6px) scale(1.01);
        box-shadow: var(--shadow-lg);
        border-color: var(--card-accent, var(--primary));
        text-decoration: none;
      }

      .nav-card-title {
        font-family: "Manrope", sans-serif;
        font-size: 1.25rem;
        font-weight: 800;
        color: var(--heading);
        margin-bottom: 10px;
      }

      .nav-card-desc {
        color: var(--text-muted);
        font-size: 0.94rem;
        line-height: 1.75;
        margin: 0;
      }

      .nav-card-arrow {
        display: inline-block;
        margin-top: 16px;
        font-size: 0.88rem;
        font-weight: 700;
        color: var(--card-accent, var(--primary-strong));
        letter-spacing: 0.02em;
      }

      .card-github { --card-accent: #0969da; }
      .card-aitools { --card-accent: #7c3aed; }
      .card-mytools { --card-accent: #059669; }
      .card-links   { --card-accent: #d97706; }

      @media (max-width: 720px) {
        .top-grid {
          grid-template-columns: 1fr;
          gap: 12px;
        }
        .nav-card {
          padding: 20px 16px 20px 20px;
          border-radius: var(--radius-md);
        }
        .nav-card-title {
          font-size: 1.1rem;
          margin-bottom: 6px;
        }
        .nav-card-desc {
          font-size: 0.88rem;
        }
        .nav-card-arrow {
          margin-top: 10px;
          font-size: 0.84rem;
        }
      }
    </style>
  </head>
  <body class="theme-home">
    <nav class="top-nav">
      <a href="./index.html" class="nav-item active">Home</a>
      <a href="./github-trend.html" class="nav-item">GitHub</a>
      <a href="./ai-tools-monitor.html" class="nav-item">AI Tools</a>
      <a href="./my-tools.html" class="nav-item">Project</a>
      <a href="./links.html" class="nav-item">Bookmark</a>
    </nav>
    <div class="shell">
      <header class="hero">
        <h1>harunami AI base</h1>
        <p class="hero-copy">
          AI関連の情報を集約する個人ポータルサイトです。GitHub Trendの記事、AIツールの更新情報、自作ツール、厳選リンクを一か所にまとめています。
        </p>
      </header>

      <main class="layout">
        <section class="card" style="margin-top: 32px;">
          <div class="section-head" style="display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 16px;">
            <div>
              <p class="eyebrow">Recent Updates</p>
              <h2>最新の更新</h2>
            </div>
            <div class="controls" style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
              <div class="search-box" style="position: relative; flex: 1; min-width: 200px;">
                <input type="text" id="article-search" placeholder="記事を検索..." style="width: 100%; padding: 8px 12px 8px 32px; border-radius: var(--radius-md); border: 1px solid var(--line); background: var(--surface-strong); font-size: 0.88rem; font-family: inherit; color: var(--text);">
                <span style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); opacity: 0.5;">🔍</span>
              </div>
              <div class="filter-bar" style="display: flex; gap: 8px;">
                <button class="filter-btn active" data-category="all">All</button>
                <button class="filter-btn" data-category="ai-tool-log">Tool</button>
                <button class="filter-btn" data-category="github-trending">GitHub</button>
              </div>
            </div>
          </div>

          <div id="latest-updates-list" class="archive-list" style="margin-top: 20px;">
            <!-- JavaScriptでレンダリング -->
            <div class="loading-placeholder" style="padding: 40px; text-align: center; color: var(--text-muted);">
              読み込み中...
            </div>
          </div>
        </section>
      </main>

      <footer class="footer"><p>harunami AI base</p></footer>
    </div>

    <script>
      (async function() {
        const listRoot = document.getElementById('latest-updates-list');
        const buttons = document.querySelectorAll('.filter-btn');
        const searchInput = document.getElementById('article-search');
        
        const response = await fetch('./data/articles.json', { cache: 'no-store' });
        const data = await response.json();
        const allArticles = [...data.articles].sort((a, b) => b.publishedAt.localeCompare(a.publishedAt));

        let currentCategory = 'all';
        let currentSearch = '';

        function render() {
          let filtered = allArticles;
          
          if (currentCategory !== 'all') {
            filtered = filtered.filter(a => a.category === currentCategory);
          }
          
          if (currentSearch) {
            const lowSearch = currentSearch.toLowerCase();
            filtered = filtered.filter(a => 
              a.title.toLowerCase().includes(lowSearch) || 
              (a.dek && a.dek.toLowerCase().includes(lowSearch)) || 
              (a.summary && a.summary.toLowerCase().includes(lowSearch)) ||
              a.repoName.toLowerCase().includes(lowSearch)
            );
          }

          // 最新15件まで表示（検索時は件数制限を少し緩める）
          const displayItems = filtered.slice(0, 15);
          
          if (displayItems.length === 0) {
            listRoot.innerHTML = '<div style="padding: 40px; text-align: center; color: var(--text-muted);">該当する記事がありません。</div>';
            return;
          }

          listRoot.innerHTML = displayItems.map(a => `
            <a class="archive-item card-link-box" href="${a.articleUrl}">
              <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px;">
                <h3 style="margin: 0; font-size: 1.05rem;">${a.title}</h3>
                <span class="category-tag ${a.category}" style="font-size: 0.7rem; padding: 2px 8px; border-radius: 4px;">${a.category === 'ai-tool-log' ? 'Tool' : 'GitHub'}</span>
              </div>
              <div class="archive-meta" style="margin-bottom: 8px;">
                <span>${a.publishedAt}</span>
                <span>${a.repoName}</span>
              </div>
              <p style="font-size: 0.9rem; line-height: 1.6; color: var(--text-muted); overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;">${a.dek || a.summary}</p>
            </a>
          `).join('');
        }

        buttons.forEach(btn => {
          btn.addEventListener('click', () => {
            buttons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCategory = btn.dataset.category;
            render();
          });
        });

        searchInput.addEventListener('input', (e) => {
          currentSearch = e.target.value;
          render();
        });

        // 初期表示
        render();
      })();
    </script>
  </body>
</html>
