<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="GitHub Trending の自動解析と、気になったリポジトリのピックアップ記事。"
    />
    <meta name="theme-color" content="#f7fbff" />
    <title>GitHub Watcher | harunami AI base</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .gh-tab-bar {
        display: flex;
        gap: 8px;
        margin-bottom: 20px;
      }
      .gh-tab-btn {
        padding: 6px 16px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: var(--surface-strong);
        color: var(--text-muted);
        font-size: 0.88rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s ease;
        font-family: inherit;
        white-space: nowrap;
      }
      .gh-tab-btn:hover,
      .gh-tab-btn.active {
        background: #0969da;
        color: #fff;
        border-color: #0969da;
      }
      .gh-tab-content { display: none; }
      .gh-tab-content.active { display: block; }
      .gh-search-panel {
        margin-top: 16px;
        margin-bottom: 16px;
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: var(--radius-md);
        background: linear-gradient(135deg, #f8fbff 0%, #eef6ff 100%);
      }
      .gh-search-row {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }
      .gh-search-input {
        flex: 1 1 320px;
        min-width: 220px;
        padding: 12px 14px;
        border: 1px solid #bfdbfe;
        border-radius: 12px;
        font: inherit;
        background: #fff;
        color: var(--heading);
      }
      .gh-search-input:focus {
        outline: none;
        border-color: #0969da;
        box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.12);
      }
      .gh-search-clear {
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid #bfdbfe;
        background: #fff;
        color: #0969da;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }
      .gh-search-summary {
        margin-top: 10px;
        color: var(--text-muted);
        font-size: 0.9rem;
      }
      .category-accordion-list {
        display: grid;
        gap: 14px;
      }
      .category-accordion {
        border: 1px solid var(--line);
        border-radius: var(--radius-md);
        background: var(--category-tint, #f8fafc);
        overflow: hidden;
        box-shadow: var(--shadow-sm);
      }
      .category-accordion[open] {
        border-color: rgba(9, 105, 218, 0.24);
        box-shadow: var(--shadow-md);
      }
      .category-summary {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 16px 18px;
        cursor: pointer;
        list-style: none;
        background: var(--category-tint, #f8fafc);
      }
      .category-summary::-webkit-details-marker { display: none; }
      .category-summary::marker { display: none; content: ""; }
      .category-summary-main {
        flex: 1;
        min-width: 0;
      }
      .category-summary-row {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .category-summary h3 {
        margin: 0;
        color: var(--heading);
        font-size: 1rem;
      }
      .category-summary-meta {
        margin-top: 6px;
        color: var(--text-muted);
        font-size: 0.84rem;
      }
      .category-chevron {
        flex: 0 0 auto;
        color: var(--text-muted);
        font-size: 0.9rem;
        transition: transform 0.15s ease;
      }
      .category-accordion[open] .category-chevron {
        transform: rotate(180deg);
      }
      .category-body {
        padding: 0 18px 18px;
        border-top: 1px solid var(--line);
        background: var(--category-tint, #f8fafc);
      }
      .meta-chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 3px 10px;
        border-radius: 999px;
        border: 1px solid transparent;
        font-size: 0.74rem;
        font-weight: 700;
        line-height: 1;
        letter-spacing: 0.02em;
      }
      .meta-chip.category-chip {
        background: #eff6ff;
        border-color: #bfdbfe;
        color: #1d4ed8;
      }
      .meta-chip.new-chip {
        background: #fff4e5;
        border-color: #fdba74;
        color: #c2410c;
      }
      .meta-chip.new-chip.category-new {
        background: #fee2e2;
        border-color: #fca5a5;
        color: #b91c1c;
      }
      .article-title-with-badges {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .article-title-with-badges h3 {
        margin: 0;
      }
    </style>
  </head>
  <body class="theme-github">
    <nav class="top-nav">
      <a href="./index.html" class="nav-item">Home</a>
      <a href="./github-trend.html" class="nav-item active">GitHub</a>
      <a href="./ai-tools-monitor.html" class="nav-item">AI Tools</a>
      <a href="./my-tools.html" class="nav-item">Project</a>
      <a href="./links.html" class="nav-item">Bookmark</a>
    </nav>
    <div class="shell">
      <header class="hero">
        <p class="eyebrow">Repository Analysis</p>
        <h1>GitHub Watcher</h1>
        <p class="hero-copy">
          GitHub Trending の自動解析と、気になったリポジトリのピックアップ記事を掲載しています。
        </p>
      </header>

      <main class="layout">
        <section class="card">
          <div class="gh-tab-bar">
            <button class="gh-tab-btn active" data-cat="github-articles">記事一覧</button>
            <button class="gh-tab-btn" data-cat="github-update-report">更新レポート</button>
          </div>

          <div id="tab-github-articles" class="gh-tab-content active">
            <div class="section-head">
              <p class="eyebrow">GitHub Archive</p>
              <h2>ツール・リポジトリ一覧</h2>
            </div>
            <div class="stats" id="site-stats-articles"></div>
            <div class="gh-search-panel">
              <div class="gh-search-row">
                <input
                  id="github-search-input"
                  class="gh-search-input"
                  type="search"
                  placeholder="記事タイトル・repo・カテゴリ・本文の単語で検索"
                  autocomplete="off"
                />
                <button id="github-search-clear" class="gh-search-clear" type="button">クリア</button>
              </div>
              <div id="github-search-summary" class="gh-search-summary">検索対象: タイトル / repo / カテゴリ / 概要 / 本文</div>
            </div>
            <div id="articles-container" style="margin-top: 16px;"></div>
          </div>

          <div id="tab-github-update-report" class="gh-tab-content">
            <div class="section-head">
              <p class="eyebrow">Task Log</p>
              <h2>更新作業レポート</h2>
            </div>
            <div class="stats" id="site-stats-report"></div>
            <div id="articles-report" class="archive-list"></div>
          </div>
        </section>
        <div style="text-align: right; margin-top: 24px;">
          <a href="https://github.com/trending" target="_blank" rel="noopener noreferrer" style="color: var(--text-muted); font-size: 0.95rem; text-decoration: none; border-bottom: 1px dashed var(--text-muted);">
            🔗 公式 GitHub Trending ページへ
          </a>
        </div>
      </main>

      <footer class="footer"><p>harunami AI base</p></footer>
    </div>

    <script>
      (async function () {
        const starredStorageKey = "harunami-ai-base-starred-articles";
        const [articlesResponse, searchIndexResponse] = await Promise.all([
          fetch(`./data/articles.json?t=${Date.now()}`, { cache: "no-store" }),
          fetch(`./data/github-search-index.json?t=${Date.now()}`, { cache: "no-store" }),
        ]);
        const payload = await articlesResponse.json();
        const searchIndexPayload = await searchIndexResponse.json();
        const searchIndexMap = new Map(
          (searchIndexPayload.articles || []).map((article) => [article.slug, article])
        );
        const starredSlugs = loadStarredSlugs();
        const all = payload.articles
          .map((article, index) => ({
            ...article,
            searchText: searchIndexMap.get(article.slug)?.searchText || buildFallbackSearchText(article),
            __index: index,
          }))
          .sort((a, b) => {
            const dateA = a.publishedAt || "";
            const dateB = b.publishedAt || "";
            const dateDiff = dateB.localeCompare(dateA);
            if (dateDiff !== 0) return dateDiff;

            const categoryA = (a.category || "").trim();
            const categoryB = (b.category || "").trim();
            const rankA = Number(a.rank);
            const rankB = Number(b.rank);
            const hasRankA = Number.isFinite(rankA);
            const hasRankB = Number.isFinite(rankB);

            if (
              categoryA === "github-trending" &&
              categoryB === "github-trending" &&
              hasRankA &&
              hasRankB &&
              rankA !== rankB
            ) {
              return rankA - rankB;
            }

            const createdAtA = Date.parse(a.createdAt || "");
            const createdAtB = Date.parse(b.createdAt || "");
            const hasCreatedAtA = !Number.isNaN(createdAtA);
            const hasCreatedAtB = !Number.isNaN(createdAtB);

            if (hasCreatedAtA && hasCreatedAtB && createdAtA !== createdAtB) {
              return createdAtB - createdAtA;
            }
            if (hasCreatedAtA !== hasCreatedAtB) {
              return hasCreatedAtB ? 1 : -1;
            }

            return b.__index - a.__index;
          })
          .map(({ __index, ...article }) => article);

        const articles = all.filter(a => a.category && (a.category.trim() === "github-trending" || a.category.trim() === "github-pickup"));
        const report = all.filter(a => a.category && a.category.trim() === "github-update-report");

        const containerEl = document.getElementById("articles-container");
        const searchInputEl = document.getElementById("github-search-input");
        const searchClearEl = document.getElementById("github-search-clear");
        const searchSummaryEl = document.getElementById("github-search-summary");
        const statsEl = document.getElementById("site-stats-articles");
        const normalizedGenreMap = {
          "AIコーディング (プロンプト・開発補助ツール)": "AIコーディング (ワークフロー・プロンプト・開発補助ツール)"
        };
        const categoryTintMap = {
          "AIコーディング (CLI本体・拡張機能)": "#dcecff",
          "AIコーディング (ワークフロー・プロンプト・開発補助ツール)": "#dcf7eb",
          "AIエージェント (自律基盤・特化アプリ)": "#ffeacf",
          "AIエージェント・マルチエージェント・オーケストレーション": "#fef3c7",
          "ローカルLLM・推論高速化・モデル量子化": "#f1f5f9",
          "金融・トレード分析": "#ebe5ff",
          "メディア作成・Web生成 (動画・画像・UI)": "#ffe0e7",
          "ナレッジ管理・RAG解析": "#dff9ff",
          "スクレイピング・情報収集・セキュリティ": "#fff8cf",
          "汎用アプリ・AI基盤・IoT": "#ebedf3",
          "学習ガイド・開発アセット": "#e1f8df",
          "その他・未分類（ユーティリティ等）": "#edf2f8"
        };
        const categoryOrder = [
          "AIコーディング (CLI本体・拡張機能)",
          "AIコーディング (ワークフロー・プロンプト・開発補助ツール)",
          "AIエージェント (自律基盤・特化アプリ)",
          "AIエージェント・マルチエージェント・オーケストレーション",
          "ローカルLLM・推論高速化・モデル量子化",
          "金融・トレード分析",
          "メディア作成・Web生成 (動画・画像・UI)",
          "ナレッジ管理・RAG解析",
          "スクレイピング・情報収集・セキュリティ",
          "汎用アプリ・AI基盤・IoT",
          "学習ガイド・開発アセット",
          "その他・未分類（ユーティリティ等）"
        ];
        const nowMs = Date.now();
        const newWindowMs = 3 * 24 * 60 * 60 * 1000;
        const starCountFormatter = new Intl.NumberFormat("ja-JP");
        const categoryGroups = {};
        for (const category of categoryOrder) {
          categoryGroups[category] = [];
        }
        for (const article of articles) {
          const rawCategory = (article.genre || "その他・未分類（ユーティリティ等）").trim();
          const category = normalizedGenreMap[rawCategory] || rawCategory;
          if (!categoryGroups[category]) categoryGroups[category] = [];
          categoryGroups[category].push(article);
        }

        renderArticles(articles, "");

        // Report
        const reportEl = document.getElementById("articles-report");
        const reportStatsEl = document.getElementById("site-stats-report");
        if (reportStatsEl) {
          reportStatsEl.innerHTML = `
            <div class="stat-box"><span>レポート数</span><strong>${report.length}</strong></div>
          `;
        }
        if(reportEl) {
          reportEl.innerHTML = report.length === 0
            ? '<div class="archive-item" style="border: 1px dashed var(--line); text-align: center; color: var(--text-muted);"><h3>まだレポートがありません</h3><p>更新作業のログがここに追加されます。</p></div>'
            : report.map(a => renderArticle(a)).join("");
          attachStarHandlers(reportEl);
        }

        // Tabs
        document.querySelectorAll(".gh-tab-btn").forEach(btn => {
          btn.addEventListener("click", () => {
            document.querySelectorAll(".gh-tab-btn").forEach(b => b.classList.remove("active"));
            document.querySelectorAll(".gh-tab-content").forEach(c => c.classList.remove("active"));
            btn.classList.add("active");
            document.getElementById("tab-" + btn.dataset.cat).classList.add("active");
          });
        });

        searchInputEl.addEventListener("input", () => {
          renderArticles(articles, searchInputEl.value || "");
        });
        searchClearEl.addEventListener("click", () => {
          searchInputEl.value = "";
          renderArticles(articles, "");
          searchInputEl.focus();
        });

        function renderArticle(article, options = {}) {
          const deck = article.dek ?? article.summary ?? "詳細情報はありません。";
          const published = article.publishedAt || "不明";
          const categoryLabel = options.categoryLabel || (article.category || "未分類");
          const isNew = isWithinNewWindow(getArticleTimestamp(article));
          
          let originBadge = "";
          if (article.originType === "trending") {
             const rankValue = String(article.rank ?? "").trim();
             const normalizedRankValue = rankValue.replace(/^Rank/i, "");
             const label = normalizedRankValue ? `Rank${normalizedRankValue}` : "Trending";
             originBadge = `<span class="rank-label" style="background:#fdf2f8;color:#be185d;border-color:#fce7f3;">${label}</span>`;
          } else if (article.originType === "pickup" || article.category === "github-pickup") {
             originBadge = `<span class="rank-label" style="background:#f0fdf4;color:#15803d;border-color:#dcfce7;">PickUp</span>`;
          }

          const serialTag = Number.isFinite(Number(article.serial))
            ? `<span class="serial-badge">#${String(article.serial).padStart(3, "0")}</span>`
            : "";
          const repoTag = article.repoName ? `<span>${article.repoName}</span>` : "";
          const starTag = renderStarMeta(article);
          const isStarred = starredSlugs.has(article.slug);
          return `
            <div class="archive-item article-card">
              <div class="article-card-head">
                <a class="card-link-box article-card-link" href="${article.articleUrl}">
                  <div class="article-card-title-row">
                    <div class="article-title-with-badges">
                      <h3>${article.title}</h3>
                      ${isNew ? '<span class="meta-chip new-chip">NEW</span>' : ""}
                    </div>
                    ${serialTag}
                  </div>
                  <div class="archive-meta">
                    <span>${published}</span>
                    ${serialTag}
                    <span class="meta-chip category-chip">${categoryLabel}</span>
                    ${originBadge}
                    ${starTag}
                    ${repoTag}
                  </div>
                  <p>${deck}</p>
                </a>
                ${renderStarButton(article.slug, isStarred)}
              </div>
            </div>
          `;
        }

        function renderStarMeta(article) {
          const label = formatStarCount(article.starCount);
          return `<span>★ ${label}</span>`;
        }

        function formatStarCount(value) {
          if (value === null || value === undefined || value === "") return "不明";
          const numericValue = Number(value);
          if (!Number.isFinite(numericValue)) return "不明";
          return starCountFormatter.format(numericValue);
        }

        function renderStarButton(slug, isStarred) {
          const label = isStarred ? "★" : "☆";
          const pressed = isStarred ? "true" : "false";
          const title = isStarred ? "スターを外す" : "スターを付ける";
          const activeClass = isStarred ? " is-active" : "";
          return `
            <button
              class="star-toggle${activeClass}"
              type="button"
              data-star-slug="${slug}"
              aria-pressed="${pressed}"
              title="${title}"
            >${label}</button>
          `;
        }

        function loadStarredSlugs() {
          try {
            const raw = window.localStorage.getItem(starredStorageKey);
            const parsed = raw ? JSON.parse(raw) : [];
            return new Set(Array.isArray(parsed) ? parsed : []);
          } catch {
            return new Set();
          }
        }

        function saveStarredSlugs(next) {
          window.localStorage.setItem(
            starredStorageKey,
            JSON.stringify([...next].sort())
          );
        }

        function attachStarHandlers(root) {
          root.querySelectorAll("[data-star-slug]").forEach((button) => {
            button.addEventListener("click", (event) => {
              event.preventDefault();
              event.stopPropagation();
              const next = loadStarredSlugs();
              const slug = button.dataset.starSlug;
              if (next.has(slug)) {
                next.delete(slug);
              } else {
                next.add(slug);
              }
              saveStarredSlugs(next);
              button.textContent = next.has(slug) ? "★" : "☆";
              button.classList.toggle("is-active", next.has(slug));
              button.setAttribute("aria-pressed", next.has(slug) ? "true" : "false");
              button.setAttribute("title", next.has(slug) ? "スターを外す" : "スターを付ける");
            });
          });
        }

        function getArticleTimestamp(article) {
          const value = Date.parse(article.createdAt || article.publishedAt || "");
          return Number.isNaN(value) ? 0 : value;
        }

        function getNewestTimestamp(items) {
          return items.reduce((max, article) => Math.max(max, getArticleTimestamp(article)), 0);
        }

        function isWithinNewWindow(timestamp) {
          return Number.isFinite(timestamp) && timestamp > 0 && nowMs - timestamp <= newWindowMs;
        }

        function formatCategoryLatest(items) {
          const latest = [...items].sort((a, b) => getArticleTimestamp(b) - getArticleTimestamp(a))[0];
          return latest ? (latest.publishedAt || "不明") : "不明";
        }

        function buildFallbackSearchText(article) {
          return [
            article.title || "",
            article.dek || "",
            article.summary || "",
            article.repoName || "",
            article.genre || "",
            article.category || "",
          ].join(" ").trim();
        }

        function sortCategoryItems(items) {
          items.sort((a, b) => {
            const createdA = Date.parse(a.createdAt || a.publishedAt || "");
            const createdB = Date.parse(b.createdAt || b.publishedAt || "");
            const hasA = !Number.isNaN(createdA);
            const hasB = !Number.isNaN(createdB);
            if (hasA && hasB && createdA !== createdB) return createdB - createdA;
            if (hasA !== hasB) return hasB ? 1 : -1;
            const rankA = Number(a.rank);
            const rankB = Number(b.rank);
            if (a.category === "github-trending" && b.category === "github-trending" && Number.isFinite(rankA) && Number.isFinite(rankB) && rankA !== rankB) {
              return rankA - rankB;
            }
            return 0;
          });
          return items;
        }

        function renderArticles(sourceArticles, rawQuery) {
          const query = normalizeSearchQuery(rawQuery);
          const filteredArticles = query
            ? sourceArticles.filter((article) => normalizeSearchQuery(article.searchText || "").includes(query))
            : sourceArticles;

          const groups = {};
          for (const category of categoryOrder) {
            groups[category] = [];
          }
          for (const article of filteredArticles) {
            const rawCategory = (article.genre || "その他・未分類（ユーティリティ等）").trim();
            const category = normalizedGenreMap[rawCategory] || rawCategory;
            if (!groups[category]) groups[category] = [];
            groups[category].push(article);
          }
          for (const category of Object.keys(groups)) {
            sortCategoryItems(groups[category]);
          }

          let html = `<div class="category-accordion-list">`;
          let displayIndex = 0;
          for (const category of categoryOrder) {
            const items = groups[category] || [];
            if (items.length === 0) continue;
            displayIndex += 1;
            const latestCreatedAt = getNewestTimestamp(items);
            const isCategoryNew = !query && isWithinNewWindow(latestCreatedAt);
            html += `
              <details class="category-accordion" style="--category-tint: ${categoryTintMap[category] || "#f8fafc"};" ${query ? "open" : ""}>
                <summary class="category-summary">
                  <div class="category-summary-main">
                    <div class="category-summary-row">
                      <h3>${displayIndex}. ${category}</h3>
                      ${isCategoryNew ? '<span class="meta-chip new-chip category-new">NEW</span>' : ""}
                    </div>
                    <div class="category-summary-meta">直近追加: ${formatCategoryLatest(items)} / 並び順: 作成日時の新しい順 / ${items.length}件</div>
                  </div>
                  <span class="category-chevron">▾</span>
                </summary>
                <div class="category-body">
                  <div class="archive-list">
                    ${items.map((article) => renderArticle(article, { categoryLabel: category })).join("")}
                  </div>
                </div>
              </details>
            `;
          }
          html += `</div>`;

          const latestDate = sourceArticles.length > 0
            ? [...sourceArticles]
                .sort((a, b) => getArticleTimestamp(b) - getArticleTimestamp(a))[0]
                .publishedAt || "-"
            : "-";
          const visibleCategoryCount = Object.keys(groups).filter((category) => (groups[category] || []).length > 0).length;
          statsEl.innerHTML = `
            <div class="stat-box"><span>${query ? "検索ヒット数" : "総記事数"}</span><strong>${filteredArticles.length}</strong></div>
            <div class="stat-box"><span>${query ? "対象期間" : "最新追加"}</span><strong>${query ? latestDate + " まで" : latestDate}</strong></div>
            <div class="stat-box"><span>${query ? "ヒットカテゴリ数" : "カテゴリ数"}</span><strong>${visibleCategoryCount}</strong></div>
          `;
          if (query) {
            searchSummaryEl.textContent = `「${rawQuery.trim()}」の検索結果: ${filteredArticles.length}件 / ${visibleCategoryCount}カテゴリ`;
          } else {
            searchSummaryEl.textContent = "検索対象: タイトル / repo / カテゴリ / 概要 / 本文";
          }
          containerEl.innerHTML = filteredArticles.length === 0
            ? '<div class="archive-item"><h3>該当する記事がありません。</h3><p>別の単語や repo 名で試してください。</p></div>'
            : html;
          attachStarHandlers(containerEl);
        }

        function normalizeSearchQuery(value) {
          return String(value || "")
            .toLowerCase()
            .normalize("NFKC")
            .replace(/\s+/g, " ")
            .trim();
        }
      })();
    </script>
  </body>
</html>
