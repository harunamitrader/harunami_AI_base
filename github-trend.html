<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="GitHub Trending の未記事 repo を毎朝追加して公開する GitHub Trend Journal。"
    />
    <meta name="theme-color" content="#f7fbff" />
    <title>GitHub Watcher | harunami AI base</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <nav class="top-nav">
      <a href="./index.html" class="nav-item">Home</a>
      <a href="./github-trend.html" class="nav-item active">GitHub</a>
      <a href="./ai-tools-monitor.html" class="nav-item">AI Tools</a>
      <a href="./my-tools.html" class="nav-item">Project</a>
      <a href="./links.html" class="nav-item">Bookmark</a>
    </nav>
    <div class="shell">
      <header class="hero">
        <a class="hero-link" href="https://github.com/trending" target="_blank" rel="noreferrer">
          GitHub Trending
        </a>
        <p class="eyebrow">Daily Journal</p>
        <h1>GitHub Watcher</h1>
        <p class="hero-copy">
          構成は極力シンプルです。GitHub Trending の未記事 repo を確認し、該当があれば上位から最大 5 本まで追加します。
          このページは Codex に「今日の記事作って」と頼んで更新する前提の GitHub Pages です。
        </p>
        <div style="margin-top: 24px; display: flex; gap: 12px;">
          <a href="./ai-tools-monitor.html" class="link-button" style="margin-top: 0; background: var(--primary); color: white;">
            📊 AIツール監視ページ
          </a>
          <a href="https://github.com/harunamitrader/github_trend" target="_blank" rel="noreferrer" class="link-button" style="margin-top: 0;">
            GitHub Repo
          </a>
        </div>
      </header>

      <main class="layout">
        <section class="card intro-card">
          <div class="stats" id="site-stats"></div>
        </section>

        <section class="card latest-card">
          <div class="section-head">
            <p class="eyebrow">Today</p>
            <h2>今日の記事</h2>
          </div>
          <div id="today-articles" class="archive-list"></div>
        </section>

        <section class="card archive-card">
          <div class="section-head">
            <p class="eyebrow">Archive</p>
            <h2>過去の記事</h2>
          </div>
          <div id="archive-list" class="archive-list"></div>
        </section>
      </main>

      <footer class="footer"><p>harunami AI base</p></footer>
    </div>

    <script type="module" src="./app.js?v=20260324-archivefix"></script>
  </body>
</html>
