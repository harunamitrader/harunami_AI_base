<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="GitHub Trending の自動解析と、気になったリポジトリのピックアップ記事。"
    />
    <meta name="theme-color" content="#f7fbff" />
    <title>GitHub Watcher | harunami AI base</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .gh-tab-bar {
        display: flex;
        gap: 8px;
        margin-bottom: 20px;
      }
      .gh-tab-btn {
        padding: 6px 16px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: var(--surface-strong);
        color: var(--text-muted);
        font-size: 0.88rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s ease;
        font-family: inherit;
        white-space: nowrap;
      }
      .gh-tab-btn:hover,
      .gh-tab-btn.active {
        background: #0969da;
        color: #fff;
        border-color: #0969da;
      }
      .gh-tab-content { display: none; }
      .gh-tab-content.active { display: block; }
    </style>
  </head>
  <body class="theme-github">
    <nav class="top-nav">
      <a href="./index.html" class="nav-item">Home</a>
      <a href="./github-trend.html" class="nav-item active">GitHub</a>
      <a href="./ai-tools-monitor.html" class="nav-item">AI Tools</a>
      <a href="./my-tools.html" class="nav-item">Project</a>
      <a href="./links.html" class="nav-item">Bookmark</a>
    </nav>
    <div class="shell">
      <header class="hero">
        <p class="eyebrow">Repository Analysis</p>
        <h1>GitHub Watcher</h1>
        <p class="hero-copy">
          GitHub Trending の自動解析と、気になったリポジトリのピックアップ記事を掲載しています。
        </p>
      </header>

      <main class="layout">
        <section class="card">
          <div class="gh-tab-bar">
            <button class="gh-tab-btn active" data-cat="github-trending">Trending</button>
            <button class="gh-tab-btn" data-cat="github-pickup">ピックアップ</button>
          </div>

          <div id="tab-github-trending" class="gh-tab-content active">
            <div class="section-head">
              <p class="eyebrow">Auto Analysis</p>
              <h2>Trending 記事</h2>
            </div>
            <div class="stats" id="site-stats-trending"></div>
            <div id="articles-trending" class="archive-list" style="margin-top: 16px;"></div>
          </div>

          <div id="tab-github-pickup" class="gh-tab-content">
            <div class="section-head">
              <p class="eyebrow">Hand Picked</p>
              <h2>ピックアップ記事</h2>
            </div>
            <div id="articles-pickup" class="archive-list"></div>
          </div>
        </section>
      </main>

      <footer class="footer"><p>harunami AI base</p></footer>
    </div>

    <script>
      (async function () {
        const response = await fetch(`./data/articles.json?t=${Date.now()}`, { cache: "no-store" });
        const payload = await response.json();
        const all = [...payload.articles].sort((a, b) => {
          const dateA = a.publishedAt || "";
          const dateB = b.publishedAt || "";
          const dateDiff = dateB.localeCompare(dateA);
          if (dateDiff !== 0) return dateDiff;
          return (a.rank || 999) - (b.rank || 999);
        });

        const trending = all.filter(a => a.category && a.category.trim() === "github-trending");
        const pickup = all.filter(a => a.category && a.category.trim() === "github-pickup");

        // Trending
        const statsEl = document.getElementById("site-stats-trending");
        const latestDate = trending.length > 0 ? (trending[0].publishedAt || "-") : "-";
        statsEl.innerHTML = `
          <div class="stat-box"><span>記事数</span><strong>${trending.length}</strong></div>
          <div class="stat-box"><span>最終投稿日</span><strong>${latestDate}</strong></div>
          <div class="stat-box"><span>運用</span><strong>自動解析</strong></div>
        `;

        const trendingEl = document.getElementById("articles-trending");
        trendingEl.innerHTML = trending.length === 0
          ? '<div class="archive-item"><h3>まだ記事がありません。</h3></div>'
          : trending.map(a => renderArticle(a)).join("");

        // Pickup
        const pickupEl = document.getElementById("articles-pickup");
        pickupEl.innerHTML = pickup.length === 0
          ? '<div class="archive-item" style="border: 1px dashed var(--line); text-align: center; color: var(--text-muted);"><h3>まだ記事がありません</h3><p>気になったリポジトリの解析記事がここに追加されます。</p></div>'
          : pickup.map(a => renderArticle(a)).join("");

        // Tabs
        document.querySelectorAll(".gh-tab-btn").forEach(btn => {
          btn.addEventListener("click", () => {
            document.querySelectorAll(".gh-tab-btn").forEach(b => b.classList.remove("active"));
            document.querySelectorAll(".gh-tab-content").forEach(c => c.classList.remove("active"));
            btn.classList.add("active");
            document.getElementById("tab-" + btn.dataset.cat).classList.add("active");
          });
        });

        function renderArticle(article) {
          const deck = article.dek ?? article.summary ?? "詳細情報はありません。";
          const published = article.publishedAt || "不明";
          const rankTag = article.rank && article.rank < 99 ? `<span class="rank-label">${article.rank}</span>` : "";
          return `
            <a class="archive-item card-link-box" href="${article.articleUrl}">
              <h3>${article.title}</h3>
              <div class="archive-meta">
                <span>${published}</span>
                ${rankTag}
                <span>${article.repoName}</span>
              </div>
              <p>${deck}</p>
            </a>
          `;
        }
      })();
    </script>
  </body>
</html>
