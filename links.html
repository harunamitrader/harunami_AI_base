<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="X(Twitter)、GitHub、Zenn、Qiita、Note などから厳選した AI 関連リンクをカテゴリ別に収集・整理するページ。"
    />
    <meta name="theme-color" content="#f7fbff" />
    <title>AI Bookmark | harunami AI base</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .tab-bar {
        display: flex;
        flex-wrap: nowrap;
        overflow-x: auto;
        gap: 8px;
        margin-bottom: 24px;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        padding-bottom: 4px;
      }
      .tab-bar::-webkit-scrollbar {
        display: none;
      }

      .tab-btn {
        padding: 6px 16px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: var(--surface-strong);
        color: var(--text-muted);
        font-size: 0.88rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s ease;
        font-family: inherit;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .tab-btn:hover,
      .tab-btn.active {
        background: var(--primary);
        color: #fff;
        border-color: var(--primary);
      }

      .link-section {
        display: none;
      }

      .link-section.active {
        display: block;
      }

      .link-category-head {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
      }

      .link-category-icon {
        font-size: 1.4rem;
        line-height: 1;
      }

      .link-category-title {
        font-family: "Manrope", sans-serif;
        font-size: 1.1rem;
        font-weight: 800;
        color: var(--heading);
      }

      .link-empty {
        padding: 32px 20px;
        border-radius: var(--radius-md);
        border: 1px dashed var(--line);
        text-align: center;
        color: var(--text-muted);
        font-size: 0.94rem;
      }
    </style>
  </head>
  <body>
    <nav class="top-nav">
      <a href="./index.html" class="nav-item">Home</a>
      <a href="./github-trend.html" class="nav-item">GitHub</a>
      <a href="./ai-tools-monitor.html" class="nav-item">AI Tools</a>
      <a href="./my-tools.html" class="nav-item">Project</a>
      <a href="./links.html" class="nav-item active">Bookmark</a>
    </nav>
    <div class="shell">
      <header class="hero">
        <p class="eyebrow">Link Collection</p>
        <h1>AI Bookmark</h1>
        <p class="hero-copy">
          X(Twitter)、GitHub、Zenn、Qiita、Note などから厳選した AI 関連リンクをカテゴリ別に収集・整理しています。
        </p>
      </header>

      <main class="layout">
        <section class="card">
          <div class="section-head">
            <p class="eyebrow">Categories</p>
            <h2>カテゴリ別リンク</h2>
          </div>

          <div class="tab-bar">
            <button class="tab-btn active" data-target="tab-x">X(Twitter)</button>
            <button class="tab-btn" data-target="tab-github">GitHub</button>
            <button class="tab-btn" data-target="tab-zenn">Zenn</button>
            <button class="tab-btn" data-target="tab-qiita">Qiita</button>
            <button class="tab-btn" data-target="tab-note">Note</button>
            <button class="tab-btn" data-target="tab-web">Web</button>
            <button class="tab-btn" data-target="tab-other">その他</button>
          </div>

          <div id="tab-x" class="link-section active">
            <div class="link-category-head">
              <span class="link-category-icon">🐦</span>
              <span class="link-category-title">X(Twitter)</span>
            </div>
            <div class="link-empty">リンクなし</div>
          </div>

          <div id="tab-github" class="link-section">
            <div class="link-category-head">
              <span class="link-category-icon">🐙</span>
              <span class="link-category-title">GitHub</span>
            </div>
            <div class="link-empty">リンクなし</div>
          </div>

          <div id="tab-zenn" class="link-section">
            <div class="link-category-head">
              <span class="link-category-icon">📘</span>
              <span class="link-category-title">Zenn</span>
            </div>
            <div class="link-empty">リンクなし</div>
          </div>

          <div id="tab-qiita" class="link-section">
            <div class="link-category-head">
              <span class="link-category-icon">🟩</span>
              <span class="link-category-title">Qiita</span>
            </div>
            <div class="link-empty">リンクなし</div>
          </div>

          <div id="tab-note" class="link-section">
            <div class="link-category-head">
              <span class="link-category-icon">📝</span>
              <span class="link-category-title">Note</span>
            </div>
            <div class="link-empty">リンクなし</div>
          </div>

          <div id="tab-web" class="link-section">
            <div class="link-category-head">
              <span class="link-category-icon">🌐</span>
              <span class="link-category-title">Web</span>
            </div>
            <div class="link-empty">リンクなし</div>
          </div>

          <div id="tab-other" class="link-section">
            <div class="link-category-head">
              <span class="link-category-icon">🔗</span>
              <span class="link-category-title">その他</span>
            </div>
            <div class="link-empty">リンクなし</div>
          </div>
        </section>
      </main>

      <footer class="footer"><p>harunami AI base</p></footer>
    </div>

    <script>
      const tabs = document.querySelectorAll('.tab-btn');
      const sections = document.querySelectorAll('.link-section');

      tabs.forEach(btn => {
        btn.addEventListener('click', () => {
          tabs.forEach(b => b.classList.remove('active'));
          sections.forEach(s => s.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById(btn.dataset.target).classList.add('active');
        });
      });
    </script>
  </body>
</html>
