<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="{{DEK_DESCRIPTION}}"
    />
    <meta name="theme-color" content="#f7fbff" />
    <title>{{ARTICLE_TITLE}}</title>
    <link rel="icon" href="../../favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../styles.css" />
  </head>
  <body>
    <article class="article-shell">
      <div class="article-topline">
        <a class="article-back" href="../../index.html">← 記事一覧へ戻る</a>
        <p class="eyebrow">{{EYEBROW_TEXT}}</p>
      </div>

      <h1 class="article-title">{{ARTICLE_TITLE}}</h1>
      <p class="article-dek">{{DEK_DESCRIPTION}}</p>

      <div class="article-meta-grid">
        <div class="article-meta-item">
          <span class="meta-label">リリース日</span>
          <!-- {{YYYY_MM_DD}} -->
          <strong>{{YYYY_MM_DD}}</strong>
        </div>
        <div class="article-meta-item">
          <span class="meta-label">{{METADATA_LABEL_2}}</span>
          <strong>{{METADATA_VALUE_2}}</strong>
        </div>
        <div class="article-meta-item">
          <span class="meta-label">ツール</span>
          <strong>{{TOOL_NAME}}</strong>
        </div>
      </div>

      <div class="article-body">
        <h2>主な変更点</h2>
        <p>{{MAIN_CHANGES_INTRO}}</p>
        <ul>
            <!-- <li><strong>{{FEATURE_NAME}}:</strong> {{FEATURE_DESC}}</li> -->
            {{MAIN_CHANGES_LIST}}
        </ul>

        <h2>影響や使いどころ</h2>
        <p>{{IMPACT_AND_USAGE}}</p>

        <h2>まとめ</h2>
        <p>{{SUMMARY}}</p>

        <h2>参照リンク</h2>
        <div class="source-item">
          <a href="{{SOURCE_URL}}" target="_blank" rel="noreferrer">{{SOURCE_NAME}}</a>
        </div>
      </div>
    </article>
  </body>
</html>
